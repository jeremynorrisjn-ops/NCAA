.site-subtitle{font-size:11px;color:#7a8190;letter-spacing:0.05em;text-transform:uppercase}
.filter-key{display:flex;gap:1.2rem;font-size:11px;color:#7a8190}

.main{max-width:1100px;margin:0 auto;padding:2rem}

.tab:hover{color:#f0ece4;background:#1d2229}
.tab.active{background:#e8c84a;color:#0d0f12}
.region-heading{display:flex;align-items:baseline;gap:1rem;margin-bottom:1rem}
.region-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#e8c84a}
.region-meta{font-size:12px;color:#7a8190}
.team-list{display:flex;flex-direction:column;gap:4px}
.team-card{border:1px solid rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;transition:border-color 0.2s}
.team-card:hover{border-color:rgba(255,255,255,0.12)}
.team-header{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;background:#161a1f;user-select:none;transition:background 0.15s}
.team-header:hover{background:#1d2229}
.seed-pill{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;flex-shrink:0}
.s1{background:rgba(232,200,74,0.15);color:#e8c84a}

.team-name{font-size:14px;font-weight:500;flex:1;color:#f0ece4}
.team-record{font-size:12px;color:#7a8190;font-variant-numeric:tabular-nums}
.chevron{font-size:10px;color:#4a5060;transition:transform 0.25s;margin-left:4px}
.team-card.open .chevron{transform:rotate(180deg)}
.team-body{display:none;background:#161a1f;border-top:1px solid rgba(255,255,255,0.07);padding:12px 16px 14px}
.team-card.open .team-body{display:block}
table.stats{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
table.stats thead th{text-align:left;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#7a8190;padding:0 8px 6px;border-bottom:1px solid rgba(255,255,255,0.07)}
table.stats thead th.r{text-align:right}
table.stats tbody td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.05);color:#f0ece4;vertical-align:middle}
table.stats tbody tr:last-child td{border-bottom:none}
table.stats tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
table.stats tbody td.ppg{color:#e8c84a;font-weight:500;text-align:right;font-variant-numeric:tabular-nums}
table.stats tbody tr:hover td{background:rgba(255,255,255,0.02)}
.filter-note{font-size:10px;color:#4a5060;margin-top:8px;letter-spacing:0.02em}
.no-players{font-size:12px;color:#7a8190;padding:4px 0}
.source-note{font-size:10px;color:#4a5060;margin-top:4px}

.sheets-cell-input{width:70px;padding:6px 10px;background:#1d2229;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#f0ece4;font-size:12px;font-family:'DM Sans',sans-serif;text-transform:uppercase}
.sheets-cell-input:focus{outline:none;border-color:#e8c84a}
.sheets-status{font-size:11px;padding:4px 10px;border-radius:4px;display:none}
.sheets-status.ok{display:inline;background:rgba(78,203,130,0.15);color:#4ecb82}
.sheets-status.err{display:inline;background:rgba(232,85,85,0.15);color:#e85555}
.sheets-status.sending{display:inline;background:rgba(232,200,74,0.1);color:#e8c84a}
.selected-player{font-size:12px;color:#e8c84a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.send-btn{padding:6px 14px;background:#e8c84a;color:#0d0f12;border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.send-btn:hover{background:#d4b53c}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.undo-btn{padding:6px 14px;background:transparent;color:#7a8190;border:1px solid rgba(255,255,255,0.12);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.undo-btn:hover{border-color:#e85555;color:#e85555}
.undo-btn:disabled{opacity:0.3;cursor:not-allowed}
.reset-btn{padding:6px 14px;background:transparent;color:#e85555;border:1px solid rgba(232,85,85,0.4);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.reset-btn:hover{background:rgba(232,85,85,0.15);border-color:#e85555}
table.stats td.radio-col{width:28px;padding:7px 4px 7px 8px}
input[type=radio]{accent-color:#e8c84a;width:14px;height:14px;cursor:pointer}

const regions=Object.keys(BRACKET);
let activeRegion='East';
const openState={};

function seedClass(s){return s===1?'s1':s===2?'s2':s===3?'s3':s===4?'s4':'s-other'}

function renderTabs(){
  document.getElementById('regionTabs').innerHTML=regions.map(r=>
    `<button class="tab${r===activeRegion?' active':''}" onclick="setRegion('${r}')">${r}</button>`
  ).join('');
}

function renderMeta(){
  const d=BRACKET[activeRegion];
  document.getElementById('regionName').textContent=activeRegion+' Region';
  document.getElementById('regionMeta').textContent='No. 1 seed: '+d.seed1;
}

function renderTeams(){
  const list=document.getElementById('teamList');
  list.innerHTML=BRACKET[activeRegion].teams.map(t=>{
    const key=activeRegion+'_'+t.seed;
    const isOpen=!!openState[key];
    const minPPG=t.seed<=2?7:t.seed<=4?8:10;
    const isTBD=t.players[0].name.startsWith('TBD');
    const filtered=isTBD?[]:t.players.filter(p=>p.ppg>=minPPG);
    let bodyHtml='';
    if(isOpen){
      if(isTBD){
        bodyHtml='<p class="no-players">Team to be determined after First Four play-in game.</p>';
      } else if(filtered.length===0){
        bodyHtml=`<p class="no-players">No players averaging ${minPPG}+ PPG.</p>`;
      } else {
        const rows=filtered.map(p=>{
          const val=`${p.name} - ${t.name}`;
          const rid=`r_${val.replace(/[^a-zA-Z0-9]/g,'_')}`;
          return `<tr>
            <td class="radio-col"><input type="radio" name="playerPick" id="${rid}" value="${val}" onchange="selectPlayer('${val.replace(/'/g,"\\'")}')"></td>
            <td><label for="${rid}" style="cursor:pointer">${p.name}</label></td>
            <td class="r">${p.gp}</td><td class="r">${p.mpg.toFixed(1)}</td><td class="ppg">${p.ppg.toFixed(1)}</td>
          </tr>`;
        }).join('');
        const srcLabel=t.src?`· Source: ${t.src}`:'';
        bodyHtml=`<table class="stats"><thead><tr><th></th><th>Player</th><th class="r">GP</th><th class="r">MPG</th><th class="r">PPG</th></tr></thead><tbody>${rows}</tbody></table>
        <p class="filter-note">Showing ${minPPG}+ PPG · Seed ${t.seed} ${srcLabel}</p>`;
      }
    }
    return `<div class="team-card${isOpen?' open':''}">
      <div class="team-header" onclick="toggle('${key}')">
        <div class="seed-pill ${seedClass(t.seed)}">${t.seed}</div>
        <div class="team-name">${t.name}</div>
        <div class="team-record">${t.record}</div>
        <div class="chevron">&#9660;</div>
      </div>
      <div class="team-body">${bodyHtml}</div>
    </div>`;
  }).join('');
}

function setRegion(r){activeRegion=r;renderTabs();renderMeta();renderTeams()}
function toggle(key){openState[key]=!openState[key];renderTeams()}

let currentPlayer='';
let lastAction=null; // stores {cell, value, row} for undo

function selectPlayer(val){
  currentPlayer=val;
  document.getElementById('selectedLabel').textContent=val;
  document.getElementById('sendBtn').disabled=false;
  const st=document.getElementById('sheetsStatus');
  st.className='sheets-status';
  st.textContent='';
}

async function sendToSheets(){
  const url=document.getElementById('scriptUrl').value.trim();
  const cell=document.getElementById('targetCell').value.trim().toUpperCase();
  const st=document.getElementById('sheetsStatus');

  if(!url){
    st.className='sheets-status err';
    st.textContent='Paste your Apps Script URL first';
    return;
  }
  if(!cell.match(/^[A-Z]+\d+$/)){
    st.className='sheets-status err';
    st.textContent='Invalid cell — use format like B5';
    return;
  }
  if(!currentPlayer){
    st.className='sheets-status err';
    st.textContent='Select a player first';
    return;
  }

  st.className='sheets-status sending';
  st.textContent='Sending…';
  document.getElementById('sendBtn').disabled=true;

  const params=new URLSearchParams({sheet:'Player Totals',cell:cell,value:currentPlayer});

  try{
    const res=await fetch(`${url}?${params}`);
    const json=await res.json();
    if(json.status==='success'){
      st.className='sheets-status ok';
      st.textContent='Written to '+cell;
      // Strike through and disable the selected radio + its row
      const checked=document.querySelector('input[name="playerPick"]:checked');
      if(checked){
        checked.disabled=true;
        const row=checked.closest('tr');
        if(row) row.classList.add('used-player');
        // Save for undo
        lastAction={cell:cell, value:currentPlayer, radio:checked, row:row};
        document.getElementById('undoBtn').disabled=false;
      }
      // Reset selection
      currentPlayer='';
      document.getElementById('selectedLabel').textContent='No player selected';
      document.getElementById('sendBtn').disabled=true;
    } else {
      st.className='sheets-status err';
      st.textContent='Error: '+json.message;
      document.getElementById('sendBtn').disabled=false;
    }
  } catch(e){
    st.className='sheets-status err';
    st.textContent='Could not reach script — check URL';
    document.getElementById('sendBtn').disabled=false;
  }
}

async function undoLast(){
  if(!lastAction) return;
  const url=document.getElementById('scriptUrl').value.trim();
  const st=document.getElementById('sheetsStatus');
  const {cell, radio, row}=lastAction;

  st.className='sheets-status sending';
  st.textContent='Undoing…';
  document.getElementById('undoBtn').disabled=true;

  const params=new URLSearchParams({sheet:'Player Totals',cell:cell,value:''});

  try{
    const res=await fetch(`${url}?${params}`);
    const json=await res.json();
    if(json.status==='success'){
      // Re-enable the row
      radio.disabled=false;
      radio.checked=false;
      if(row) row.classList.remove('used-player');
      lastAction=null;
      st.className='sheets-status ok';
      st.textContent='Undo successful — '+cell+' cleared';
    } else {
      st.className='sheets-status err';
      st.textContent='Undo failed: '+json.message;
      document.getElementById('undoBtn').disabled=false;
    }
  } catch(e){
    st.className='sheets-status err';
    st.textContent='Undo failed — could not reach script';
    document.getElementById('undoBtn').disabled=false;
  }
}

function resetDraft(){
  if(!confirm('Reset the draft? This will restore all players and clear your selections on this page. It will NOT clear the Google Sheet.')) return;

  // Re-enable all disabled radios and remove strikethrough from all rows
  document.querySelectorAll('input[name="playerPick"]').forEach(r=>{
    r.disabled=false;
    r.checked=false;
    const row=r.closest('tr');
    if(row) row.classList.remove('used-player');
  });

  // Reset state
  currentPlayer='';
  lastAction=null;
  document.getElementById('selectedLabel').textContent='No player selected';
  document.getElementById('sendBtn').disabled=true;
  document.getElementById('undoBtn').disabled=true;
  const st=document.getElementById('sheetsStatus');
  st.className='sheets-status ok';
  st.textContent='Draft reset';
  setTimeout(()=>{st.className='sheets-status';st.textContent='';},2500);
}

window.setRegion=setRegion;
window.toggle=toggle;
window.selectPlayer=selectPlayer;
window.sendToSheets=sendToSheets;
window.undoLast=undoLast;
window.resetDraft=resetDraft;
renderTabs();renderMeta();renderTeams();
</script>
